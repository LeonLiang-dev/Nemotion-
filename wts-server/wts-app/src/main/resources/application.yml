server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: wts-server
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: ${JWT_SECRET:wts-change-this-secret-key-in-production-at-least-256-bits}
  access-token-expiration: 7200
  refresh-token-expiration: 604800

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:8000,http://127.0.0.1:8000}
  access:
    lan:
      enabled: ${LAN_ACCESS_ENABLED:false}
      auto-same-subnet: ${LAN_AUTO_SAME_SUBNET:true}
      allowed-cidrs: ${LAN_ALLOWED_CIDRS:}

# 文件上传
file:
  upload-dir: ./uploads

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
